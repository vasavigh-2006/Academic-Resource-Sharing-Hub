name: academicapp
description: "Academic Resource Sharing and Communication System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1  # Ensure this matches your local Flutter 'flutter --version'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Firebase dependencies - versions aligned for compatibility
  firebase_core: ^4.6.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0

  
  provider: ^6.1.5+1
  file_picker: ^10.3.9  # Latest stable with Flutter 3.29 support
  pdfx: ^2.9.2
  intl: ^0.20.2
  uuid: ^4.5.3
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.4
  google_fonts: ^8.0.2
  http: ^1.1.0
  path_provider: ^2.1.1
  syncfusion_flutter_pdf: ^33.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/holographic_students.png
